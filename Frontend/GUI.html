<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ULTRON AI</title>
  <style>
    body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#000; color: #fff; font-family: 'Segoe UI', sans-serif; }
    #container { width:calc(100% - 350px); height:100%; float: left; }
    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 60px;
      background: rgba(0, 0, 0, 0.8);
      border-bottom: 1px solid #00aaff;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      box-shadow: 0 0 20px #00aaff;
    }
    #assistantName {
      font-size: 24px;
      font-weight: bold;
      color: #00aaff;
      text-shadow: 0 0 10px #00aaff;
    }
    #settingsIcon {
      width: 30px;
      height: 30px;
      cursor: pointer;
    }
    #chatPanel {
      position: fixed;
      top: 60px;
      right: 0;
      width: 350px;
      height: calc(100% - 60px);
      background: rgba(0, 0, 0, 0.8);
      border-left: 1px solid #00aaff;
      box-shadow: 0 0 20px #00aaff;
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #chatHistory {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .message {
      margin-bottom: 15px;
    }
    .user-message {
      text-align: right;
      color: #00aaff;
    }
    .assistant-message {
      text-align: left;
      color: #fff;
    }
    #inputContainer {
      padding: 20px;
      border-top: 1px solid #00aaff;
    }
    #messageInput {
      width: 100%;
      padding: 10px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid #00aaff;
      border-radius: 5px;
      color: #fff;
      outline: none;
    }
    #sendButton {
      width: 100%;
      padding: 10px;
      background: #00aaff;
      border: none;
      border-radius: 5px;
      color: #fff;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div id="navbar">
    <div id="assistantName">ULTRON</div>
    <img id="settingsIcon" src="https://img.icons8.com/ios-filled/50/00aaff/settings.png" alt="Settings">
  </div>
  <div id="container"></div>
  <div id="chatPanel">
    <div id="chatHistory"></div>
    <div id="inputContainer">
      <input type="text" id="messageInput" placeholder="Type your message...">
      <button id="sendButton">Send</button>
    </div>
  </div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.146.0/build/three.module.js';

    const container = document.getElementById('container');
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth/container.clientHeight, 0.1, 100);
    camera.position.z = 3.5;
    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(container.clientWidth, container.clientHeight);
    container.appendChild(renderer.domElement);

    const colorStart = new THREE.Color(0x001f3f);
    const colorEnd   = new THREE.Color(0x00aaff);
    const pointCount = 120000;
    const positions = new Float32Array(pointCount*3);
    const basePos = new Float32Array(pointCount*3);
    const normals = new Float32Array(pointCount*3);
    const baseCols = new Float32Array(pointCount*3);
    const phases  = new Float32Array(pointCount);
    for(let i=0;i<pointCount;i++){
      const u=Math.random(), v=Math.random();
      const theta=2*Math.PI*u, phi=Math.acos(2*v-1);
      const x=Math.sin(phi)*Math.cos(theta), y=Math.sin(phi)*Math.sin(theta), z=Math.cos(phi);
      const idx=i*3;
      basePos.set([x,y,z],idx);
      normals.set([x,y,z],idx);
      positions.set([x,y,z],idx);
      const t=(z+1)*0.5;
      const c=colorStart.clone().lerp(colorEnd,t);
      baseCols.set([c.r,c.g,c.b],idx);
      phases[i]=Math.random()*Math.PI*2;
    }
    const geom=new THREE.BufferGeometry();
    geom.setAttribute('position',new THREE.BufferAttribute(positions,3));
    geom.setAttribute('color',new THREE.BufferAttribute(baseCols.slice(),3));
    const mat=new THREE.PointsMaterial({ size:0.008, vertexColors:true, transparent:true, opacity:0.9, depthWrite:false });
    const pointsMesh=new THREE.Points(geom,mat);
    scene.add(pointsMesh);

    const ray=new THREE.Raycaster(), mouse=new THREE.Vector2();
    const hoverRadius=0.2, baseRotate=0.000255;
    let rotateSpeed=baseRotate, minSpeed=0.0001, maxSpread=0.5;
    let smoothF=0, time=0;
    window.addEventListener('mousemove',e=>{
      mouse.x=(e.clientX/container.clientWidth)*2-1;
      mouse.y=-(e.clientY/container.clientHeight)*2+1;
    });

    let ws;
    let assistantName = 'ULTRON';

    async function loadConfig() {
      try {
        const response = await fetch('/api/config');
        const config = await response.json();
        assistantName = config.assistant_name;
        document.getElementById('assistantName').textContent = assistantName;
      } catch (error) {
        console.error('Failed to load config:', error);
      }
    }

    function initWebSocket(){
      try {
        ws = new WebSocket(`ws://${window.location.host}/ws`);

        ws.onopen = () => {
          console.log('WebSocket connection opened');
        };

        ws.onclose = () => {
          console.log('WebSocket connection closed, reconnecting...');
          setTimeout(initWebSocket, 1000);
        };

        ws.onerror = (error) => {
          console.error('WebSocket error:', error);
        };

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type === 'chat_response') {
            addMessage(data.assistant, data.message, 'assistant');
            fetch('/api/tts', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ text: data.message })
            });
          } else if (data.type === 'stt_result') {
            addMessage('You', data.text, 'user');
            ws.send(JSON.stringify({ type: 'chat', message: data.text }));
          } else if (data.type === 'error') {
            addMessage('Error', data.message, 'assistant');
          }
        };
      }
      catch (error) {
        console.error('Failed to connect to WebSocket:', error);
      }
    }

    function addMessage(sender, message, type) {
      const chatHistory = document.getElementById('chatHistory');
      const messageElement = document.createElement('div');
      messageElement.classList.add('message', `${type}-message`);
      messageElement.innerHTML = `<strong>${sender}:</strong> ${message}`;
      chatHistory.appendChild(messageElement);
      chatHistory.scrollTop = chatHistory.scrollHeight;
    }

    const messageInput = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');

    function sendMessage() {
      const message = messageInput.value.trim();
      if (message) {
        addMessage('You', message, 'user');
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'chat', message: message }));
        } else {
          console.error('WebSocket not connected');
        }
        messageInput.value = '';
      }
    }

    sendButton.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        sendMessage();
      }
    });

    function animate(){
      requestAnimationFrame(animate);
      time += 0.005;
      let raw=0;
      smoothF += (raw - smoothF)*0.05;
      const disp = Math.min(0.2 + smoothF*0.8, maxSpread);
      for(let i=0;i<pointCount;i++){
        const idx=i*3, off = disp * Math.sin(time + phases[i]);
        positions[idx]   = basePos[idx]   + normals[idx]*off;
        positions[idx+1] = basePos[idx+1] + normals[idx+1]*off;
        positions[idx+2] = basePos[idx+2] + normals[idx+2]*off;
      }
      geom.attributes.position.needsUpdate = true;
      pointsMesh.rotation.y += rotateSpeed;
      renderer.render(scene, camera);
    }

    loadConfig();
    initWebSocket();
    animate();

    window.addEventListener('resize', ()=>{
      camera.aspect = container.clientWidth/container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    });
  </script>
</body>
</html>
